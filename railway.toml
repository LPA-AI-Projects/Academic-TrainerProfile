# Academic Trainer Profile — public HTTP must hit FastAPI (Uvicorn), not a Caddy-only static host.
# Symptoms of a wrong setup: Caddy "fileserver.(*FileServer).notFound" and 404 on POST /api/v1/...
#
# Set the Railway service "Root Directory" to this folder (trainer-profile) if the Git repo root is above it.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# Overrides any mistaken dashboard "Start Command" (e.g. caddy run). Matches backend/Dockerfile intent.
startCommand = "/bin/sh -c \"exec uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8080}\""
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
