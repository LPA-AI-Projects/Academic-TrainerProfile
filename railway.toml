# Single service: Docker image runs Uvicorn only. Point the public domain at this service
# (remove/disable any separate Caddy or static host on the same production URL).
#
# If the Git repo root is above this folder, set Railway "Root Directory" to `trainer-profile`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "/bin/sh -c \"exec python -m uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8080}\""
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
