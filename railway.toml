# Build with Docker (not Railpack "Staticfile" + Caddy). If builds still pick Railpack,
# ensure this file lives at the Railway service root directory for the repo.
#
# Required variable: DATABASE_URL → Railway Postgres (or external) reachable from this service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
# Use the image CMD (Uvicorn). Avoid a duplicate startCommand that can confuse PORT handling.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
