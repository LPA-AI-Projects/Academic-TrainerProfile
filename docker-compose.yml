services:
  postgres:
    image: postgres:16
    container_name: lpa-trainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trainer_profiles
    ports:
      - "5433:5432"
    volumes:
      - lpa_trainer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trainer_profiles"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lpa_trainer_pgdata:
